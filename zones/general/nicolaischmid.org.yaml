# Redirected to nicolaischmid.de
"":
  - octodns:
      cloudflare:
        proxied: true
    ttl: 1
    type: A
    value: 192.0.2.1

  - ttl: 1
    type: TXT
    values:
      - nicolaischmid.org
      - v=spf1 -all

"*":
  - octodns:
      cloudflare:
        proxied: true
    ttl: 300
    type: A
    value: 192.0.2.1

  - ttl: 300
    type: URLFWD
    value:
      path: "/*"
      target: "https://nicolaischmid.de"
      code: 301
      masking: 2
      query: 0

