# Redirected to nicolaischmid.de
"":
  - octodns:
      cloudflare:
        proxied: true
    ttl: 1
    type: A
    value: 192.0.2.1

  - ttl: 1
    type: TXT
    values:
      - nicolaischmid.org
      - v=spf1 -all

"*":
  octodns:
    cloudflare:
      proxied: true
      urlfwd:
        - path: "/*"
          target: "https://nicolaischmid.de/$1"
          status_code: 301
          preserve_path_suffix: true
          preserve_query_string: false
  ttl: 300
  type: A
  value: 192.0.2.1

